<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { 
    --primary: #F25E92;
    --secondary: #3267FF;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    color: black; background-color: #f3f7fa;
    overflow-x: hidden;
    width: 100%; height: 100%;
    margin: 0; padding: 0;
  } 

  a {
    cursor: pointer;
  }

  button, a {
    transition: all 0.3s;
  }

  button:active {
    transform: scale(0.95);
  }

  #statsContainer {
    position: relative;
  }

  .containerTop img {
    cursor: pointer;
    transition: all 0.3s;
  }

  .containerTop img:hover {
    opacity: 0.5;
  }

  .containerTop img:active {
    transform: scale(0.9);
  }

  #stats { 
    top: -42px;
    z-index: 2;
    border-radius: 12px;
    background-color: rgb(255, 255, 255);
    position: absolute;
    box-shadow: 0px 0px 18px 0px rgba(0,0,0,0.25);
    width: 280px; height: 100px;
    left: 50%; transform: translate(-50%, 0);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #stats b {
    font-size: 48px;
    /* Monospaced Font */
    font-family: ui-monospace,SFMono-Regular,SF Mono,Menlo,Consolas,Liberation Mono,monospace !important;
    font-weight: bold;
    color: var(--primary);
    margin: 0;
    padding: 0;
  }

  #stats p {
    font-size: 18px;
    font-weight: normal;
    color: black  ;
    margin: 0;
    padding: 0;
    text-align: center;
  }

  .nav-link {
    margin: 0px 24px 0px 24px;
    color: var(--secondary);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    text-decoration: none;
  }

  .nav-link::after {
    content: "";
    position: absolute;
    left: 0px;
    bottom: -4px;
    width: 0px;
    height: 1px;
    background-color: black;
    transition: width 0.5s ease-out;
  }

  .nav-link:hover::after {
    width: 100%;
  }

  .container {
    padding-left: max(10%, 80px);
    padding-right: max(10%, 80px);
  }

  .containerTop {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    height: 5rem;
  }

  .containerThree {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    transform: translateY(-2px);
    padding-top: 48px !important;
    padding-bottom: 48px;
  }

  .containerThree .containerItem {
    background-color: #0f1012;
    border-radius: 18px;
    padding: 18px;
    width: 100%;
    margin-bottom: 24px;
    height: 140px;
  }

  .containerThree .containerItem:first-child {
    margin-right: 24px;
  }

  .containerThree .containerItem:last-child {
    margin-left: 24px;
  }

  .containerTop div:first-child {
    width: 130px;
    text-align: center;
  }

  .containerTop div:last-child {
    width: 130px;
    text-align: right;
  }

  .containerTop img {
    height: 48px;
  }

  .planet {
    min-width: 50%;
    padding: 24px;
  }

  .imageContainer {
    position: relative;
  }

  .imageContainer img {
    width: 100%;
  }

  .subtitle {
    margin-top: 4px;
    color: #CFD7DF;
  }

  .prominentSubtitle {
    margin-top: 4px;
    color: #e3e9f0;
    font-size: 20px;
  }

  svg {
    transform: translateY(5px)
  }

  .containerOne {
    padding-top: max(10%, 48px);
    padding-bottom: max(10%, 48px);
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
  }

  /* Switch to flex column on small screens */
  @media screen and (max-width: 600px) {
    .containerOne, .containerThree {
      flex-direction: column;
    }

    .musicItemPopout {
      transform: scale(0.3) !important;
    }

    .nav-link-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      padding-left: 48px;
      padding-right: 48px;
    }

    .containerFlex {
      flex-direction: column !important;
    }

    .containerFlex .primary {
      margin-bottom: 24px !important;
    }

    .footer-container {
      flex-direction: column !important;
    }

    .containerFlex button, .containerFour button {
      margin-left: 0px !important;
      margin-top: 24px !important;
    }
  }

  .containerDark {
    text-align: center;
    background-color: #171a1f;
    color: white;
    padding-top: 24px;
  }

  .containerDark .primary {
    margin-top: 48px;
    font-weight: 700;
    font-size: 36px;
  }

  .primary {
    font-weight: 700;
    font-size: 56px;
    margin-bottom: 0px;
    background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent; 
  }

  .iconBig {
    font-weight: 700;
    font-size: 32px;
    margin-bottom: 0px;
    background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent; 
  }

  h1.primary {
    margin-bottom: 24px;
  }

  .secondary {
    margin-top: 2px;
    font-size: 24px;
    font-weight: 500;
    color: black;
  }

  .button {
    padding: 12px 24px 12px 24px;
    text-transform: uppercase;
    font-size: 0.855rem; font-weight: 700;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    opacity: 1;
    transition: all 0.3s;
    border-radius: 9px;
    cursor: pointer;
    border: 0px;
    outline: none;
  }

  .navButton {
    border-radius: 12px;
    color: var(--primary) 
  }

  .button:hover {
    opacity: 0.6;
    transition: all 0.2s;
  }

  .button i {
    transform: translate(0, 1px);
    margin-right: 12px;
  }

  .buttonPrimary {
    background-color: #F25E92;
    margin-bottom: 16px;
    text-decoration: none;
    color: white;
  }

  #joinButton {
    margin-top: 24px;
  }

  .buttonSecondary {
    background-color: #3267FF;
    color: white;
  }

  .musicItemPopout {
    transform: scale(0.8);
    position: absolute;
    background-color: #0f1012;
    border-radius: 12px;
    max-width: 300px; height: 96px;
    left: 75%; bottom: 118px;
    margin-bottom: 0px;
    opacity: 0;
    display: flex;
    justify-content: flex-start;
    text-align: left;
    padding-right: 12px;
    align-items: center;
    box-shadow: 0px 0px 12px 0px rgba(0,0,0,0.25);
  }

  .musicItemPopout p {
    margin: 2px;
    white-space: nowrap;
    overflow: hidden;
    font-size: 16px;
    text-overflow: ellipsis;
    max-width: 150px;
  }

  .musicItemPopout span {
    margin: 2px;
  }

  .musicItemPopout img {
    border-radius: 12px 0px 0px 12px;
    width: 96px; height: 96px;
    margin-right: 12px;
  }

  .musicItemPopout p:first-child {
    color: var(--primary);
    white-space: nowrap;
    overflow-x: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
    font-weight: 700;
    font-size: 18px;
    padding-right: 12px;
  }

  .musicItemPopout span {
    color: lightslategray;
  }

  .musicItemPopoutShown {
    opacity: 1;
    transition: all 0.5s;
  }

  .musicItemPopoutAnimated {
    top: 24px !important;
    transition: all 5.999s ease-out;
    transform: scale(0.6);      
  }

  .musicItemPopoutAnimatedFade {
    opacity: 0;
    transition: all 0.5s;
  }

  .containerThree .primary {
    margin-top: 0px;
  }

  .containerTitleHeader {
    display: flex;
    flex-direction: row-reverse;
    align-items: center;
    justify-content: space-between;
  }

  .containerThree .prominentSubtitle {
    text-align: left;
    margin-top: 12px;
  }

  .containerFour {
    background-color: #0f1012;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding-top: 24px;
    padding-bottom: 24px;
  }

  .containerFour .buttonPrimary {
    margin-bottom: 0px;
  }

  .containerFour p {
    font-size: 24px;
    margin: 0px;
    font-weight: 600;
  }

  .containerSvg {
    transform: translateY(-10px);
    padding: 0px !important;
  }

  .containerFlex h1 {
    color: var(--primary);
  }

  .containerFlex {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding-top: 24px;
    padding-bottom: 24px;
  }

  .footer-container {
    padding: 12px max(10%, 80px);
    padding-bottom: 36px;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: space-between;
  }

  .containerFlex * {
    margin: 0px !important;
  }

  .containerFlex button, .containerFour button {
    margin-left: 28px;
    min-width: 160px;
  }

  .footer-container .footer-header {
    color: #212225;
  }

  .footer-container a {
    color: #0f1012;
    text-decoration: none;
  }

  .footer-container a:hover {
    text-decoration: underline;
    color: var(--primary);
  }

  .copyright {
    color: gray;
  }

  #footer center {
    background-color: white;
  }

  .magenta {
    color: var(--primary);
  }

  /* On large screens */
  @media screen and (min-width: 1400px) {
    .container {
      padding-left: 20%;
      padding-right: 20%;
    }

    .musicItemPopout {
      transform: scale(0.8) !important;
    }

    .containerFour {
      padding-left: 20% !important;
      padding-right: 20% !important;
    }
  }

  </style>
